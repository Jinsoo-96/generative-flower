# .github/workflows/deploy.yml
# 릴리스(Phase 5) 완료: 트리거 = main (프로덕션). main 머지마다 GitHub Pages로 배포.
# (개발 중에는 dev였음 — 단일 Pages 사이트를 main으로 승격.)
name: Deploy to GitHub Pages
on:
  push:
    branches: [main] # ← 프로덕션. (개발 중에는 dev였음)
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
